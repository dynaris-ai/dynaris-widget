<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Embed Demo - Dynaris Widget</title>
</head>
<body>
  <h1>Script-Tag Embed Demo</h1>
  <p>This page shows the widget loaded via script tag with data attributes.</p>

  <script
    src="/src/index.js"
    data-dynaris-widget="true"
    data-user-id="YOUR_USER_ID"
    data-api-url="https://api.dynaris.ai"
    data-title="Chat"
    data-use-polling="true"
    data-position="bottom-right"
  ></script>
</body>
</html>
